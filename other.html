  <script>
    const menuBtn = document.getElementById('menuBtn'); const menuCloseBtn = document.getElementById('menuCloseBtn'); const toggleMenu = () => { document.body.classList.toggle('menu-open'); document.body.style.overflow = document.body.classList.contains('menu-open') ? 'hidden' : 'auto'; }; menuBtn.addEventListener('click', toggleMenu); menuCloseBtn.addEventListener('click', toggleMenu); document.querySelectorAll('.mobile-menu-overlay a').forEach(link => { link.addEventListener('click', () => { document.body.classList.remove('menu-open'); document.body.style.overflow = 'auto'; }); }); const cursor = document.getElementById('cursor'); if(window.matchMedia('(pointer: fine)').matches) { window.addEventListener('mousemove', (e) => { cursor.style.left = e.clientX + 'px'; cursor.style.top = e.clientY + 'px'; }); document.querySelectorAll('a, button').forEach(el => { el.addEventListener('mouseenter', () => cursor.classList.add('hover')); el.addEventListener('mouseleave', () => cursor.classList.remove('hover')); }); } const reveals = document.querySelectorAll('.reveal'); const revealOnScroll = () => reveals.forEach(el => { if(el.getBoundingClientRect().top < window.innerHeight - 100) el.classList.add('active'); }); window.addEventListener('scroll', revealOnScroll); revealOnScroll();
    class TextScramble { constructor(el) { this.el = el; this.chars = '!<>-_\\/[]{}—=+*^?#________'; this.update = this.update.bind(this); } setText(newText) { const oldText = this.el.innerText; const length = Math.max(oldText.length, newText.length); const promise = new Promise((resolve) => this.resolve = resolve); this.queue = []; for (let i = 0; i < length; i++) { const from = oldText[i] || ''; const to = newText[i] || ''; const start = Math.floor(Math.random() * 40); const end = start + Math.floor(Math.random() * 40); this.queue.push({ from, to, start, end }); } cancelAnimationFrame(this.frameRequest); this.frame = 0; this.update(); return promise; } update() { let output = ''; let complete = 0; for (let i = 0, n = this.queue.length; i < n; i++) { let { from, to, start, end, char } = this.queue[i]; if (this.frame >= end) { complete++; output += to; } else if (this.frame >= start) { if (!char || Math.random() < 0.28) { char = this.randomChar(); this.queue[i].char = char; } output += `<span class="text-[var(--accent)]">${char}</span>`; } else { output += from; } } this.el.innerHTML = output; if (complete === this.queue.length) { this.resolve(); } else { this.frameRequest = requestAnimationFrame(this.update); this.frame++; } } randomChar() { return this.chars[Math.floor(Math.random() * this.chars.length)]; } }
    const el = document.getElementById('scramble'); const fx = new TextScramble(el); const phrases = ['Experimental edits.', 'Mixed media art.', 'Personal projects.', 'Creative freedom.']; let counter = 0; const nextPhrase = () => { fx.setText(phrases[counter]).then(() => setTimeout(nextPhrase, 800)); counter = (counter + 1) % phrases.length; }; nextPhrase();
    const modal = document.getElementById('video-modal'); const modalIframe = document.getElementById('modal-iframe'); function openModal(videoId) { modalIframe.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0`; modal.classList.add('active'); document.body.style.overflow = 'hidden'; } function closeModal() { modal.classList.remove('active'); modalIframe.src = ''; document.body.style.overflow = 'auto'; } modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); }); document.addEventListener('keydown', (e) => { if (e.key === "Escape") closeModal(); });
  </script>
