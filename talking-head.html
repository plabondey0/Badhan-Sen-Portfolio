  <style>
    :root { --bg: #050505; --accent: #c41e3a; --text: #ffffff; }

    h1, h2, h3, .font-display { font-family: 'Syne', sans-serif; }

    /* 1. CUSTOM CURSOR */
    .cursor { position: fixed; width: 20px; height: 20px; border: 1px solid var(--accent); border-radius: 50%; pointer-events: none; z-index: 9999; transition: transform 0.15s ease, width 0.3s, height 0.3s, background 0.3s, border 0.3s; mix-blend-mode: difference; display: none; }
    .cursor.hover { width: 60px; height: 60px; background: rgba(196, 30, 58, 0.2); border: 1px solid var(--accent); mix-blend-mode: normal; }
    @media (pointer: fine) { .cursor { display: block; } body { cursor: none; } }

    /* Noise */
    .noise-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9998; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E"); opacity: 0.08; }

    /* Glitch */
    .glitch-text { position: relative; display: inline-block; width: 100%; }
    .glitch-text::before, .glitch-text::after { content: attr(data-text); position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    .glitch-text::before { left: 2px; text-shadow: -2px 0 #ff00ff; clip: rect(24px, 550px, 90px, 0); animation: glitch-anim 3s infinite linear alternate-reverse; }
    .glitch-text::after { left: -2px; text-shadow: 2px 0 #00ffff; clip: rect(85px, 550px, 140px, 0); animation: glitch-anim2 2s infinite linear alternate-reverse; }
    @keyframes glitch-anim { 0% { clip: rect(30px, 9999px, 10px, 0); } 20% { clip: rect(15px, 9999px, 140px, 0); } 40% { clip: rect(50px, 9999px, 75px, 0); } 60% { clip: rect(80px, 9999px, 110px, 0); } 80% { clip: rect(10px, 9999px, 60px, 0); } 100% { clip: rect(40px, 9999px, 20px, 0); } }
    @keyframes glitch-anim2 { 0% { clip: rect(65px, 9999px, 100px, 0); } 20% { clip: rect(10px, 9999px, 50px, 0); } 40% { clip: rect(90px, 9999px, 130px, 0); } 60% { clip: rect(25px, 9999px, 80px, 0); } 80% { clip: rect(5px, 9999px, 40px, 0); } 100% { clip: rect(55px, 9999px, 70px, 0); } }

    .reveal { opacity: 0; transform: translateY(80px); transition: all 1s cubic-bezier(0.2, 0.8, 0.2, 1); }
    .reveal.active { opacity: 1; transform: translateY(0); }

    /* --- SMART HAMBURGER --- */
    .hamburger {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 6px;
        width: 30px; 
        height: 24px; 
        cursor: pointer; z-index: 100001; 
        background: transparent;
        transition: all 0.3s ease;
    }
    @media (min-width: 768px) {
        .hamburger { width: 52px; height: 52px; border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; gap: 5px; }
        .hamburger:hover { border-color: var(--accent); background: rgba(255,255,255,0.05); }
    }
    .hamburger span { display: block; height: 2px; width: 100%; background: white; border-radius: 2px; transition: all 0.3s ease; }
    @media (min-width: 768px) { .hamburger span { width: 20px; } }
    body.menu-open .hamburger { border-color: var(--accent); }
    body.menu-open .hamburger span { background: white; position: absolute; left: 50%; top: 50%; width: 20px; }
    body.menu-open .hamburger span:nth-child(1) { transform: translate(-50%, -50%) rotate(45deg); }
    body.menu-open .hamburger span:nth-child(2) { transform: translate(-50%, -50%) rotate(-45deg); }
    @media (max-width: 767px) { body.menu-open .hamburger span { width: 100%; left: 0; } }

    /* --- OVERLAY MENU --- */
    .mobile-menu-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050505; z-index: 50; display: flex; align-items: center; justify-content: center; opacity: 0; visibility: hidden; transition: opacity 0.5s ease, visibility 0.5s ease; }

    .modal-content {

      overflow: hidden;
      transform: scale(0.9);

  <script>
    // 1. Smart Hamburger Menu Logic
    const menuBtn = document.getElementById('menuBtn');
    const menuCloseBtn = document.getElementById('menuCloseBtn');
    const toggleMenu = () => {
      document.body.classList.toggle('menu-open');
      document.body.style.overflow = document.body.classList.contains('menu-open') ? 'hidden' : 'auto';
    };
    menuBtn.addEventListener('click', toggleMenu);
    menuCloseBtn.addEventListener('click', toggleMenu);
    document.querySelectorAll('.mobile-menu-overlay a').forEach(link => { link.addEventListener('click', () => { document.body.classList.remove('menu-open'); document.body.style.overflow = 'auto'; }); });

    // 2. Custom Cursor
    const cursor = document.getElementById('cursor');
    if(window.matchMedia('(pointer: fine)').matches) {
      window.addEventListener('mousemove', (e) => {
        cursor.style.left = e.clientX + 'px';
        cursor.style.top = e.clientY + 'px';
      });
      document.querySelectorAll('a, button').forEach(el => {
        el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
        el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
      });
    }

    // 3. Reveal
    const reveals = document.querySelectorAll('.reveal'); const revealOnScroll = () => reveals.forEach(el => { if(el.getBoundingClientRect().top < window.innerHeight - 100) el.classList.add('active'); }); window.addEventListener('scroll', revealOnScroll); revealOnScroll();

    // 4. Scramble
    class TextScramble { constructor(el) { this.el = el; this.chars = '!<>-_\\/[]{}—=+*^?#________'; this.update = this.update.bind(this); } setText(newText) { const oldText = this.el.innerText; const length = Math.max(oldText.length, newText.length); const promise = new Promise((resolve) => this.resolve = resolve); this.queue = []; for (let i = 0; i < length; i++) { const from = oldText[i] || ''; const to = newText[i] || ''; const start = Math.floor(Math.random() * 40); const end = start + Math.floor(Math.random() * 40); this.queue.push({ from, to, start, end }); } cancelAnimationFrame(this.frameRequest); this.frame = 0; this.update(); return promise; } update() { let output = ''; let complete = 0; for (let i = 0, n = this.queue.length; i < n; i++) { let { from, to, start, end, char } = this.queue[i]; if (this.frame >= end) { complete++; output += to; } else if (this.frame >= start) { if (!char || Math.random() < 0.28) { char = this.randomChar(); this.queue[i].char = char; } output += `<span class="text-[var(--accent)]">${char}</span>`; } else { output += from; } } this.el.innerHTML = output; if (complete === this.queue.length) { this.resolve(); } else { this.frameRequest = requestAnimationFrame(this.update); this.frame++; } } randomChar() { return this.chars[Math.floor(Math.random() * this.chars.length)]; } }
    const el = document.getElementById('scramble'); const fx = new TextScramble(el); const phrases = ['Interview editing.', 'Podcast production.', 'Professional cuts.', 'Engaging conversations.']; let counter = 0; const nextPhrase = () => { fx.setText(phrases[counter]).then(() => setTimeout(nextPhrase, 800)); counter = (counter + 1) % phrases.length; }; nextPhrase();

    // --- VIDEO MODAL LOGIC ---
    const modal = document.getElementById('video-modal');
    const modalIframe = document.getElementById('modal-iframe');

    function openModal(videoId) {
      // Set the correct YouTube URL with autoplay
      modalIframe.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0`;
      modal.classList.add('active');
      document.body.style.overflow = 'hidden'; // Prevent background scroll
    }

    function closeModal() {
      modal.classList.remove('active');
      // Clear src to stop the video immediately
      modalIframe.src = '';
      document.body.style.overflow = 'auto'; // Restore scroll
    }

    // Close modal when clicking outside the content
    modal.addEventListener('click', (e) => {
      if (e.target === modal) {
        closeModal();
      }
    });

    // Close modal with Escape key
    document.addEventListener('keydown', (e) => {
      if (e.key === "Escape") {
        closeModal();
      }
    });
  </script>
